<div class="border border-black rounded-2xl p-5 m-6">
    <div class="flex ">
        <p class="text-gray-600 ml-auto">#{{data.id}}</p>
    </div>
    <div>
        <p class="font-bold text-xl text-black mb-3">{{data.title}}</p>
        @if ('body' in data ) {
        <p class="mb-3">{{data.body}}</p>
        }
    </div>
    <div>
        <p class="border p-1.5 bg-purple-300 text-purple-800 text-center">User ID: {{data.userId}}</p>
    </div>
    @if ('completed' in data ) {
        @if(data.completed){
            <p class="border p-1.5 bg-green-300 text-green-900 text-center mt-3">Completed</p>
        } @else {
            <p class="border p-1.5 bg-red-300 text-red-900 text-center mt-3">Not Completed</p>
        }
    }
</div>
