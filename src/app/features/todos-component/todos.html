@if(isloading){
<app-loader></app-loader>
}
@else if (errorMsg) {
    <app-error-handler
    [errorCode]="errorCode"
    [errorMsg]="errorMsg"
    >

    </app-error-handler>
}
@else {
<div class="grid grid-cols-3 gap-2">
    @for(todos of store_todos;track todos.id){
    <app-card [id]="todos.id"
            [title]="todos.title"
            [completed]="todos.completed"
            [userId]="todos.userId" ></app-card>
    }
</div>
}
