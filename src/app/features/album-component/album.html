@if(isLoading){
    <app-loader></app-loader>
}
@else if (errorMsg) {
    <app-error-handler
        [errorCode]="errorCode"
        [errorMsg]="errorMsg"
    ></app-error-handler>
    
}
@else {


<div class="grid grid-cols-3 gap-2">
    @for(album of store_album;track album.id){
    <app-card [id]="album.id"
        [title]="album.title"
        [userId]="album.userId"
    ></app-card>
    }
</div>
}
